name: CRCL + BTC 市場監控系統

on:
  schedule:
    # 每日早晨日報（香港時間 早上 8:30 = UTC 0:30，每天包括週末）
    - cron: '30 0 * * *'
    # 重大新聞掃描（每 30 分鐘一次，全天候包括週末）
    - cron: '0 * * * *'
    - cron: '30 * * * *'
    # 美股開盤前預覽（美東 9:00 AM = UTC 13:00，週一至五）
    - cron: '0 13 * * 1-5'
    # 美股開盤時間（美東 9:30 AM = UTC 13:30）每 30 分鐘執行一次
    - cron: '30 13 * * 1-5'
    - cron: '0 14 * * 1-5'
    - cron: '30 14 * * 1-5'
    - cron: '0 15 * * 1-5'
    - cron: '30 15 * * 1-5'
    - cron: '0 16 * * 1-5'
    - cron: '30 16 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '30 17 * * 1-5'
    - cron: '0 18 * * 1-5'
    - cron: '30 18 * * 1-5'
    - cron: '0 19 * * 1-5'
    - cron: '30 19 * * 1-5'
    - cron: '0 20 * * 1-5'
    # 美股收盤後每日總結（美東 4:15 PM = UTC 20:15，週一至五）
    - cron: '15 20 * * 1-5'
  workflow_dispatch:  # 允許手動觸發

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: 下載程式碼
      uses: actions/checkout@v4
      
    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 安裝依賴套件
      run: |
        pip install yfinance requests pandas beautifulsoup4 feedparser numpy

    - name: 每日早晨日報（香港時間 8:30，CRCL + BTC 完整分析）
      if: github.event.schedule == '30 0 * * *' || github.event_name == 'workflow_dispatch'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python daily_report.py

    - name: 重大新聞掃描（每 30 分鐘，全天候）
      if: github.event.schedule == '0 * * * *' || github.event.schedule == '30 * * * *'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python news_alert.py
        
    - name: 執行 CRCL 開盤前預覽（盤前 9:00）
      if: github.event.schedule == '0 13 * * 1-5'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python crcl_alert_full.py preview
        
    - name: 執行 CRCL 監控檢查（盤中，有信號才通知）
      if: github.event.schedule != '15 20 * * 1-5' && github.event.schedule != '0 13 * * 1-5' && github.event.schedule != '30 0 * * *' && github.event.schedule != '0 * * * *' && github.event.schedule != '30 * * * *'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python crcl_alert_full.py
        
    - name: 執行 CRCL 每日收盤總結（收盤後 4:15）
      if: github.event.schedule == '15 20 * * 1-5'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python crcl_alert_full.py daily
